<!-- Network Info Card -->
<div class="card" id="networkInfo" style="margin-bottom: 20px;">
    <h3>🌐 Network Information</h3>
    <div class="settings-grid">
        <div class="setting-group">
            <label>Local IP Address</label>
            <div id="localIP" style="font-family: monospace; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 5px;">Loading...</div>
            <small>For players on same WiFi network</small>
        </div>
        <div class="setting-group">
            <label>Public Address</label>
            <div id="publicAddress" style="font-family: monospace; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 5px;">Not active</div>
            <small>For players anywhere in the world</small>
        </div>
        <div class="setting-group">
            <label>Tunnel Status</label>
            <div id="tunnelStatus" style="padding: 8px; border-radius: 5px;">Inactive</div>
            <button id="toggleTunnelBtn" class="btn btn-primary" style="margin-top: 10px; width: 100%;" onclick="toggleTunnel()">🌍 Start Global Tunnel</button>
        </div>
    </div>
</div>
